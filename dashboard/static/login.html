<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard AI — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #f0f0f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: rgba(22, 22, 31, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.5rem;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
            backdrop-filter: blur(20px);
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .logo .accent {
            background: linear-gradient(135deg, #6366f1, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #55556a;
            font-size: 0.85rem;
            margin-bottom: 2rem;
        }

        .error-msg {
            color: #ef4444;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            min-height: 1.2em;
        }

        input[type="password"] {
            width: 100%;
            padding: 0.9rem 1rem;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 0.75rem;
            color: #f0f0f5;
            font-size: 1rem;
            font-family: 'JetBrains Mono', monospace;
            outline: none;
            margin-bottom: 1.5rem;
            transition: border-color 0.2s;
        }

        input[type="password"]:focus {
            border-color: #6366f1;
        }

        button {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #6366f1, #ec4899);
            border: none;
            border-radius: 0.75rem;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }
    </style>
</head>

<body>
    <form class="login-card" method="POST" action="/login">
        <div class="logo">Vanguard<span class="accent">AI</span></div>
        <p class="subtitle">Security Dashboard Access</p>
        <p class="error-msg" id="errorMsg">{{ error }}</p>
        <input type="password" name="password" placeholder="Enter access password" autofocus required>
        <button type="submit">Authenticate</button>
    </form>
</body>

</html>
